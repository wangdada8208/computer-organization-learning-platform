name: 自动部署到服务器

on:
  push:
    branches: [main]
  workflow_dispatch:

# 自托管 Runner：服务器本地执行，无需 SSH 密钥
env:
  DEPLOY_PATH: /var/www/jz.wangdada8208.xyz
  DEPLOY_HOST_HEADER: jz.wangdada8208.xyz
  MIN_TEACHER_QUESTIONS: "126"

jobs:
  deploy:
    runs-on: [self-hosted, coa-server]

    steps:
      - name: 拉取最新代码
        run: |
          if [[ "$DEPLOY_PATH" != *"jz.wangdada8208.xyz"* ]]; then
            echo "DEPLOY_PATH must target jz subdomain, got: $DEPLOY_PATH" >&2
            exit 1
          fi
          cd "$DEPLOY_PATH"
          git pull origin main

      - name: 部署后端服务
        run: |
          sudo bash "$DEPLOY_PATH/ops/deploy_backend.sh"

      - name: 校验线上目录与内容
        run: |
          sudo systemctl is-active --quiet coa-sync.service
          DEPLOY_HOST_HEADER=${DEPLOY_HOST_HEADER} sudo -E bash "$DEPLOY_PATH/ops/verify_deploy.sh" "$DEPLOY_PATH" "$MIN_TEACHER_QUESTIONS"

      - name: 刷新 nginx 缓存
        run: |
          sudo nginx -t && sudo systemctl reload nginx
