name: 自动部署到服务器

on:
  push:
    branches: [main]

env:
  DEPLOY_HOST: 47.80.18.105
  DEPLOY_USER: root
  DEPLOY_PATH: /var/www/wangdada8208.xyz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: 同步站点文件到服务器
        shell: bash
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            "$GITHUB_WORKSPACE/index.html" \
            "$GITHUB_WORKSPACE/app.js" \
            "$GITHUB_WORKSPACE/styles.css" \
            "$GITHUB_WORKSPACE/simulators.js" \
            "$GITHUB_WORKSPACE/sw.js" \
            "$GITHUB_WORKSPACE/manifest.json" \
            "$GITHUB_WORKSPACE/data" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: 校验线上目录
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST"             "test -f $DEPLOY_PATH/index.html && test -f $DEPLOY_PATH/app.js && test -f $DEPLOY_PATH/data/chapters.json"
